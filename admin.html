<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YA Mayorista | Panel de Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }</style>
</head>
<body class="text-gray-800">

    <header class="bg-zinc-900 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center text-white text-2xl font-black italic">YA</div>
                <h1 class="text-2xl font-black tracking-tight">ADMIN <span class="text-red-500">PANEL</span></h1>
            </div>
            <button onclick="cerrarSesionAdmin()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-bold transition text-sm flex items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <h2 class="text-3xl font-black text-zinc-800 mb-6 border-b-2 border-gray-300 pb-2"><i class="fas fa-inbox text-[#FF6600]"></i> Pedidos Recientes</h2>
        
        <div id="pantallaCarga" class="text-center py-20">
            <i class="fas fa-spinner fa-spin text-5xl text-[#FF6600] mb-4"></i>
            <p class="font-bold text-xl text-gray-500">Verificando credenciales...</p>
        </div>

        <div id="adminPanel" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 text-sm uppercase tracking-wider">
                                <th class="p-4 font-black">ID</th>
                                <th class="p-4 font-black">Cliente / Teléfono</th>
                                <th class="p-4 font-black">Monto / Método</th>
                                <th class="p-4 font-black">Estado</th>
                                <th class="p-4 font-black text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaPedidosAdmin" class="divide-y divide-gray-200 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>

        // TUS MISMAS CREDENCIALES DE INDEX.HTML ACÁ
        const supabaseUrl = 'https://vcbqhwxlwmhwdbcplgbj.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjYnFod3hsd21od2RiY3BsZ2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDI4MzAsImV4cCI6MjA5MDAxODgzMH0.8gB7gNCVHOhQTuk2qWFgGvdpxZXHAc9LsIRST3fcMiA' ; // REEMPLAZÁ CON TU KEY
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUser = null;

        // 1. BLOQUEO DE SEGURIDAD
// 1. BLOQUEO DE SEGURIDAD MEJORADO
          window.onload = async () => {
            try {
                // Obtenemos la sesión con cuidado
                const { data, error: sessionError } = await supabaseClient.auth.getSession();
                
                if (sessionError) throw sessionError;
                
                const session = data.session;
                
                // Si no hay sesión, al login
                if (!session) { window.location.replace('./index.html'); return; }
                
                currentUser = session.user;
                
                // Revisamos si es Admin
                const { data: perfil, error: perfilError } = await supabaseClient
                    .from('perfiles')
                    .select('rol')
                    .eq('id', currentUser.id)
                    .single();
                
                // ACÁ ESTÁ LA MAGIA: Si hay un error en la base de datos, lo mostramos en vez de colgar la pantalla
                if (perfilError) {
                    console.error("Error de Supabase:", perfilError);
                    document.getElementById('pantallaCarga').innerHTML = `
                        <i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4"></i>
                        <p class="font-bold text-xl text-red-600">Error de permisos o base de datos</p>
                        <p class="text-gray-500">${perfilError.message}</p>
                    `;
                    return; // Frenamos la ejecución acá
                }

                // Verificamos el rol
                if (!perfil || perfil.rol !== 'admin') {
                    alert("🚨 Acceso denegado. Serás redirigido.");
                    window.location.replace('./index.html');
                    return;
                }

                // Si es admin, mostramos el panel y cargamos datos
                document.getElementById('pantallaCarga').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                cargarPedidosAdmin();

            } catch (err) {
                // Si el código falla por cualquier otro motivo, lo atrapamos
                console.error("Error fatal en el código:", err);
                document.getElementById('pantallaCarga').innerHTML = `
                    <p class="font-bold text-xl text-red-600">Error crítico</p>
                    <p class="text-gray-500">${err.message}</p>
                `;
            }
          };

// Variable global para almacenar los pedidos y el pedido que estamos editando
        let pedidosGlobales = [];
        let pedidoEditando = null;

        // --- ACTUALIZAMOS CARGAR PEDIDOS ---
        async function cargarPedidosAdmin() {
            const { data: pedidos, error } = await supabaseClient
                .from('pedidos')
                .select('*')
                .order('id', { ascending: false });

            if (error) return alert("Error cargando pedidos");
            
            pedidosGlobales = pedidos; // Guardamos los pedidos en memoria
            const tbody = document.getElementById('listaPedidosAdmin');
            tbody.innerHTML = '';

            pedidos.forEach(p => {
                let badge = `<span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full font-bold text-xs uppercase">Pendiente</span>`;
                if(p.estado === 'aprobado') badge = `<span class="bg-green-100 text-green-800 px-3 py-1 rounded-full font-bold text-xs uppercase">Aprobado</span>`;
                if(p.estado === 'modificado') badge = `<span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-full font-bold text-xs uppercase">Modificado</span>`;
                if(p.estado === 'rechazado') badge = `<span class="bg-red-100 text-red-800 px-3 py-1 rounded-full font-bold text-xs uppercase">Rechazado</span>`;
                if(p.estado === 'pagado') badge = `<span class="bg-blue-200 text-blue-800 px-3 py-1 rounded-full font-bold text-xs uppercase">Pagado</span>`;
       
                // Validamos si es con envío y si hay una dirección guardada
                let textoDireccion = "";
                if (p.metodo === 'envio') {
                    textoDireccion = `<p class="text-sm font-bold text-blue-700 mt-2">
                                        <i class="fas fa-map-marker-alt"></i> Dirección: ${p.direccion || 'No especificó'}
                                    </p>`;
                } else {
                    textoDireccion = `<p class="text-sm font-bold text-gray-500 mt-2">
                                        <i class="fas fa-store"></i> Retira en Sucursal
                                    </p>`;
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition border-b border-gray-100">
                        <td class="p-4 font-black text-gray-500">#${p.id}</td>
                        <td class="p-4">
                            <div class="font-bold text-gray-900">${p.nombre_cliente}</div>
                            <div class="text-xs text-gray-500"><i class="fas fa-phone"></i> ${p.telefono}</div>
                            <div> ${textoDireccion}</div>
                        </td>
                        <td class="p-4">
                            <div class="font-black text-[#FF6600]">$${Number(p.total).toLocaleString('es-AR')}</div>
                            <div class="text-xs font-bold text-gray-500 uppercase">${p.metodo}</div>
                        </td>
                        <td class="p-4">${badge}</td>
                        <td class="p-4 text-right space-x-2 whitespace-nowrap">
                            <button onclick="cambiarEstado(${p.id}, 'aprobado')" class="bg-green-500 hover:bg-green-600 text-white w-8 h-8 rounded-full shadow" title="Aprobar"><i class="fas fa-check"></i></button>
                            <button onclick="cambiarEstado(${p.id}, 'rechazado')" class="bg-red-500 hover:bg-red-600 text-white w-8 h-8 rounded-full shadow" title="Rechazar"><i class="fas fa-times"></i></button>
                            
                            <button onclick="abrirModalModificar(${p.id})" class="bg-zinc-800 hover:bg-black text-white px-4 h-8 rounded-full shadow text-xs font-bold transition">
                                <i class="fas fa-eye mr-1"></i> Ver / Editar
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // --- FUNCIÓN PARA APROBAR O RECHAZAR DESDE LA TABLA ---
        async function cambiarEstado(idPedido, nuevoEstado) {
            if(!confirm(`¿Marcar pedido #${idPedido} como ${nuevoEstado.toUpperCase()}?`)) return;
            
            try {
                const { error } = await supabaseClient
                    .from('pedidos')
                    .update({ estado: nuevoEstado })
                    .eq('id', idPedido);
                
                if(error) throw error;
                
                alert(`¡Pedido ${nuevoEstado} con éxito!`);
                cargarPedidosAdmin(); // Recarga la tablita
            } catch (err) {
                alert("Error al cambiar el estado: " + err.message);
                console.error(err);
            }
        }

        // --- FUNCIONES DEL MODAL DE DETALLES ---
        function abrirModalModificar(id) {
            // Buscamos el pedido completo en nuestra variable global
            pedidoEditando = JSON.parse(JSON.stringify(pedidosGlobales.find(p => p.id === id))); // Copia profunda
            
            // Nos aseguramos de que el carrito sea un objeto (array)
            if (typeof pedidoEditando.carrito === 'string') {
                pedidoEditando.carrito = JSON.parse(pedidoEditando.carrito);
            }

            // MAGIA AQUÍ: Guardamos la cantidad original
            pedidoEditando.carrito.forEach(item => {
                if (item.cantidad_original === undefined) {
                    item.cantidad_original = item.cantidad;
                }
            });

            document.getElementById('modalPedidoId').innerText = pedidoEditando.id;
            renderizarCarritoModal();
            
            document.getElementById('modalPedido').classList.remove('hidden');
        }

        function cerrarModalPedido() {
            document.getElementById('modalPedido').classList.add('hidden');
            pedidoEditando = null;
        }

        function renderizarCarritoModal() {
            const contenedor = document.getElementById('listaProductosModal');
            contenedor.innerHTML = '';
            
            let totalCalculado = 0;

            pedidoEditando.carrito.forEach((item, index) => {
                totalCalculado += (item.precio * item.cantidad);

                // Si la cantidad es 0 (eliminado), le ponemos un fondo rojizo y deshabilitamos restar
                const estaEliminado = item.cantidad === 0;
                const claseFondo = estaEliminado ? 'bg-red-50 opacity-60' : 'bg-white';

                contenedor.innerHTML += `
                    <div class="${claseFondo} p-3 rounded-lg border border-gray-200 flex justify-between items-center shadow-sm">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-sm leading-tight">${estaEliminado ? '<s>'+item.nombre+'</s> (Eliminado)' : item.nombre}</h4>
                            <p class="text-xs text-gray-500 font-medium mt-1">Precio Unit: $${Number(item.precio).toLocaleString('es-AR')}</p>
                        </div>
                        
                        <div class="flex items-center gap-3 ml-4">
                            <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-gray-50">
                                <button onclick="cambiarCantidadModal(${index}, -1)" class="px-3 py-1 hover:bg-gray-200 font-black text-gray-600" ${estaEliminado ? 'disabled' : ''}>-</button>
                                <span class="px-2 font-bold text-sm min-w-[30px] text-center">${item.cantidad}</span>
                                <button onclick="cambiarCantidadModal(${index}, 1)" class="px-3 py-1 hover:bg-gray-200 font-black text-gray-600">+</button>
                            </div>
                            <button onclick="eliminarDelModal(${index})" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg transition" title="Quitar producto">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            // Actualizamos el total del objeto y de la pantalla
            pedidoEditando.total = totalCalculado;
            document.getElementById('modalPedidoTotal').innerText = `$${totalCalculado.toLocaleString('es-AR')}`;
        }

        function cambiarCantidadModal(index, cambio) {
            // Ya no hace falta el JSON.parse acá porque lo hicimos al abrir el modal
            if (pedidoEditando.carrito[index].cantidad + cambio >= 0) {
                pedidoEditando.carrito[index].cantidad += cambio;
                renderizarCarritoModal(); // Volvemos a dibujar
            }
        }

        function eliminarDelModal(index) {
            // En vez de borrarlo de la lista, lo seteamos a 0 para que el cliente lo vea tachado
            pedidoEditando.carrito[index].cantidad = 0;
            renderizarCarritoModal();
        }

        async function guardarModificacionPedido() {
            // Actualizamos Supabase con el nuevo carrito, el nuevo total, y lo marcamos como "modificado"
            const { error } = await supabaseClient
                .from('pedidos')
                .update({ 
                    carrito: pedidoEditando.carrito, 
                    total: pedidoEditando.total,
                    estado: 'modificado' // Esto le avisa al cliente que hubo un cambio
                })
                .eq('id', pedidoEditando.id);

            if (error) {
                alert("Error guardando los cambios del pedido.");
                console.error(error);
            } else {
                alert("Pedido modificado y enviado a revisión del cliente.");
                cerrarModalPedido();
                cargarPedidosAdmin(); // Recargamos la tabla
            }
        }

        async function cerrarSesionAdmin() {
            await supabaseClient.auth.signOut();
            window.location.href = 'index.html';
        }

      
    </script>
    <div id="modalPedido" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
            
            <div class="bg-zinc-900 text-white p-4 flex justify-between items-center">
                <h3 class="text-xl font-black flex items-center gap-2">
                    <i class="fas fa-box-open text-[#FF6600]"></i> Pedido #<span id="modalPedidoId"></span>
                </h3>
                <button onclick="cerrarModalPedido()" class="text-gray-400 hover:text-white transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <div class="p-4 overflow-y-auto flex-1 bg-gray-50">
                <div id="listaProductosModal" class="space-y-3">
                    </div>
            </div>

            <div class="p-4 border-t border-gray-200 bg-white">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-600">Total Modificado:</span>
                    <span id="modalPedidoTotal" class="text-2xl font-black text-[#FF6600]">$0</span>
                </div>
                <button onclick="guardarModificacionPedido()" class="w-full bg-[#FF6600] hover:bg-orange-600 text-white font-black py-3 rounded-xl transition shadow-md flex justify-center items-center gap-2">
                    <i class="fas fa-save"></i> Guardar y Solicitar Aprobación
                </button>
            </div>
        </div>
    </div>
</body>
</html>
